name: CI ReUse - MAIN
on:
  workflow_call:
    inputs:
      appType:
        required: true
        type: string
jobs:
  Build:
    uses: vineethbandlamudi/roboshop-github-actions/.github/workflows/build.yml@main
    with:
      appType: '${{ inputs.appType }}'
  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test"
  DEV:
    needs: Test
    environment: DEV
    runs-on: windows-latest
    steps:
      - run: echo "Dev Env"
  QA:
    needs: DEV
    environment: QA
    runs-on: ubuntu-latest
    steps:
      - run: echo "QA Env"
