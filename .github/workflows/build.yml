name: CI ReUse - Build
on:
  workflow_call:
    inputs:
      appType:
        required: true
        type: string
jobs:
  NodeJS_Build:
    if: inputs.appType == 'nodejs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkput@v4
      - run: npm install

  Maven_Build:
    if: inputs.appType == 'maven'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkput@v4
      - run: mvn package